<!DOCTYPE html>
<html>
<head>
    <title>Six</title>
</head>
<body>

    <h1>Konfirmasi Pembayaran</h1>
    <p>Lokasi Meja: <b>K1-05 (GKU 1)</b></p>
    
    <p>
        <label for="kantin">Pilih Kantin:</label><br>
        <select id="kantin">
            <option value="Kantin A">Kantin A</option>
            <option value="Kantin B">Kantin B</option>
            <option value="Kantin C">Kantin C</option>
        </select>
    </p>

    <hr>

    <h3>Metode Pembayaran:</h3>
    
    <button onclick="showQRIS()">Bayar lewat QRIS</button>
    <br><br>
    <button onclick="payDirect()">Bayar Langsung (Kasir)</button>

    <div id="qris-container" style="display:none; margin-top: 20px;">
        <p>Silakan Scan QRIS berikut:</p>
        <img src="{{ url_for('static', filename='qris.png') }}" alt="QRIS Payment" width="200">
        <br><br>
        <button onclick="toDashboard()">Saya Sudah Bayar</button>
    </div>

    <script>
        function showQRIS() {
            document.getElementById('qris-container').style.display = 'block';
        }

        function payDirect() {
            const kantin = document.getElementById('kantin').value;
            alert("Silakan menuju kasir " + kantin + " untuk pembayaran tunai.");
            // Panggil fungsi toDashboard untuk kirim sinyal ke Python
            toDashboard();
        }

        function toDashboard() {
            const kantin = document.getElementById('kantin').value;
            
            // 1. Mengirim sinyal ke Python (Backend) menggunakan fetch
            // Kita kirim data kantin juga supaya backend tahu kantin mana yang diupdate
            fetch('/konfirmasi_bayar', { 
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ kantin: kantin }) 
            })
            .then(response => {
                if (response.ok) {
                    // 2. Setelah backend sukses update (status 200), baru pindah halaman
                    window.location.href = "/dashboard";
                } else {
                    alert("Gagal menghubungi server. Silakan coba lagi.");
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert("Terjadi kesalahan koneksi.");
            });
        }
    </script>

</body>
</html>
